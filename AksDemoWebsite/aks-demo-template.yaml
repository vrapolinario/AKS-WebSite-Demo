# ============================================================================
# AKS Demo - Kubernetes Deployment Configuration
# ============================================================================
# Before deploying: Replace <your-acr-name> with your actual ACR name
# Rename this file as aks-demo.yaml before applying it to your cluster
# Deploy with: kubectl apply -f aks-demo.yaml
# ============================================================================

# Deployment: Manages the pod replicas and rolling updates
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aksdemo-deployment
  namespace: aks-demo
spec:
  selector:
    matchLabels:
      app: aksdemo
  template:
    metadata:
      labels:
        app: aksdemo
    spec:
      # Windows node selector - ensures pods run on Windows nodes
      nodeSelector:
        kubernetes.io/os: windows
      containers:
        - name: aksdemo
          # TODO: Replace <your-acr-name> with your ACR name
          image: <your-acr-name>.azurecr.io/aksdemo:v1
          ports:
            - containerPort: 80
          # Resource limits and requests
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          # Environment variables from ConfigMap
          env:
            - name: SESSION_COUNT
              valueFrom:
                configMapKeyRef:
                  name: aksdemo-config
                  key: SESSION_COUNT
---
# Service: Exposes the deployment via Azure Load Balancer
apiVersion: v1
kind: Service
metadata:
  name: aksdemo-service
  namespace: aks-demo
spec:
  type: LoadBalancer  # Creates an Azure Load Balancer with public IP
  ports:
    - port: 80
  selector:
    app: aksdemo
---
# ConfigMap: Stores configuration data for the application
apiVersion: v1
kind: ConfigMap
metadata:
  name: aksdemo-config
  namespace: aks-demo
data:
  SESSION_COUNT: '500'  # Number of sessions to display

